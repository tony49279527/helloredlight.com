server {
    listen       8080;
    server_name  localhost;
    port_in_redirect off;
    absolute_redirect off;

    server_tokens off;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.clarity.ms https://api.web3forms.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://api.web3forms.com; upgrade-insecure-requests" always;

    root   /usr/share/nginx/html;
    index  index.html;

    # ===== LEGACY URL REDIRECTS (permanent 301) =====
    # Old product slugs
    rewrite ^/pro-300w-mini-panel/?$ /mini-panel-300w permanent;
    rewrite ^/clinical-7-color-led-mask/?$ /silicone-led-mask permanent;
    rewrite ^/luxor-360-therapy-bed/?$ /luxor-360-bed permanent;
    rewrite ^/targeted-cold-laser-pen/?$ /laser-pen permanent;
    rewrite ^/pain-relief-therapy-belt/?$ /therapy-belt permanent;
    # Old page slugs
    rewrite ^/services/?$ /partnerships permanent;
    rewrite ^/about-red-light-therapy-productsabout/?$ /factory permanent;
    rewrite ^/red-light-vs-nir-light/?$ /technology permanent;
    # Legacy blog redirects
    rewrite ^/blog/compare-red-light-therapy-brands/?$ /blog/how-to-choose-red-light-therapy-wholesale-supplier permanent;
    rewrite ^/blog/best-red-light-therapy-belts/?$ /blog/red-light-therapy-equipment-cost-guide permanent;
    rewrite ^/blog/best-red-light-therapy-canada/?$ /blog/how-to-start-red-light-therapy-business permanent;
    rewrite ^/blog/best-red-light-therapy-sleeping-bags/?$ /blog/red-light-therapy-equipment-cost-guide permanent;
    rewrite ^/red-light-therapy-benefits/?$ /blog/red-light-therapy-benefits permanent;
    rewrite ^/the-science-behind-red-light-therapy-rlt/?$ /blog permanent;
    rewrite ^/comprehensive-analysis-of-red-light-therapy-products/?$ /blog permanent;
    rewrite ^/red-light-therapy-results/?$ /blog permanent;
    rewrite ^/red-light-therapy-safety/?$ /blog permanent;
    rewrite ^/benefits-of-red-light-therapy/?$ /blog permanent;
    rewrite ^/best-red-light-therapy-bags/?$ /blog permanent;
    rewrite ^/red-light-therapy-risks/?$ /blog permanent;
    rewrite ^/red-light-therapy-vs-infrared-sauna/?$ /blog permanent;
    rewrite ^/red-light-therapy-safety-2/?$ /blog permanent;
    rewrite ^/at-home-devices-vs-professional-treatments/?$ /blog permanent;
    rewrite ^/understanding-red-light-therapy/?$ /blog permanent;
    rewrite ^/treatment-frequency-body-parts/?$ /blog permanent;
    rewrite ^/top-10-red-light-therapy-belts/?$ /blog permanent;
    rewrite ^/red-light-therapy-belts-popularity/?$ /blog permanent;
    rewrite ^/trending-red-light-products-2023/?$ /blog permanent;
    rewrite ^/popular-red-light-products/?$ /blog permanent;
    rewrite ^/popular-red-light-products-canada/?$ /blog permanent;
    rewrite ^/red-light-therapy-belt-benefits/?$ /blog permanent;

    # ===== CANONICALIZATION (301 to clean URLs) =====
    # Root index.html → root
    rewrite ^/index\.html$ / permanent;
    # Strip "index.html" from subdirectory paths
    rewrite ^(.+)/index\.html$ $1 permanent;
    # Strip trailing slashes (except root "/")
    rewrite ^/(.+)/$ /$1 permanent;
    # Strip .html suffix from any file
    rewrite ^(.+)\.html$ $1 permanent;

    # ===== SERVE STATIC FILES DIRECTLY =====
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|txt|xml|pdf|json)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===== SERVE PAGES: clean URLs → .html files =====
    # Directory index pages
    location = /blog {
        try_files /blog/index.html =404;
    }
    location = /cases {
        try_files /cases.html =404;
    }
    location = /zh {
        try_files /zh/index.html =404;
    }
    # Root
    location = / {
        try_files /index.html =404;
    }
    # Top-level pages: /foo
    location ~ ^/([^/]+)$ {
        try_files /$1.html =404;
    }
    # Section pages: /zh/foo, /blog/foo, /cases/foo
    location ~ ^/([^/]+)/([^/]+)$ {
        try_files /$1/$2.html =404;
    }

    error_page  404              /404.html;
    location = /404.html {
        root   /usr/share/nginx/html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
