    location / {
        # Attempt to serve:
        # 1. Exact file match ($uri)
        # 2. Directory index ($uri/)
        # 3. Extensionless html file ($uri.html) - crucial for clean URLs
        # 4. Fallback to 404
        try_files $uri $uri/ $uri.html =404;
    }

    # Error Pages
    error_page  404              /404.html;
    location = /404.html {
        root   /usr/share/nginx/html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

