server {
    listen       8080;
    server_name  localhost;
    port_in_redirect off;
    absolute_redirect off;

    # Enterprise Security Headers
    server_tokens off;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    root   /usr/share/nginx/html;
    index  index.html;

    # Fix directory/file conflicts and broken redirects
    rewrite ^/cases/?$ /cases.html permanent;
    rewrite ^/blog/?$ /blog/index.html permanent;
    rewrite ^/zh/?$ /zh/index.html permanent;
    rewrite ^/oem-red-light-therapy/?$ /oem-red-light-therapy.html last;
    rewrite ^/wholesale-red-light-panels/?$ /wholesale-red-light-panels.html last;
    rewrite ^/private-label-red-light-therapy/?$ /private-label-red-light-therapy.html last;

    # 1. Canonical URLs: Remove trailing slashes 
    # (e.g., /contact/ -> /contact) so search engines don't see duplicate content.
    rewrite ^/(.*)/$ /$1 permanent;

    # ==========================================
    # 2. 301 Permanent SEO Redirects (Legacy -> New)
    # ==========================================

    # Core Pages
    rewrite ^/services/?$ /partnerships permanent;
    rewrite ^/about-red-light-therapy-productsabout/?$ /factory permanent;
    
    # Technical Mapping
    rewrite ^/red-light-vs-nir-light/?$ /technology permanent;

    # Blog Catchall & Specific Fallbacks
    rewrite ^/the-science-behind-red-light-therapy-rlt/?$ /blog permanent;
    rewrite ^/comprehensive-analysis-of-red-light-therapy-products/?$ /blog permanent;
    rewrite ^/red-light-therapy-results/?$ /blog permanent;
    rewrite ^/red-light-therapy-safety/?$ /blog permanent;
    rewrite ^/benefits-of-red-light-therapy/?$ /blog permanent;
    rewrite ^/best-red-light-therapy-bags/?$ /blog permanent;
    rewrite ^/red-light-therapy-risks/?$ /blog permanent;
    rewrite ^/red-light-therapy-vs-infrared-sauna/?$ /blog permanent;
    rewrite ^/red-light-therapy-safety-2/?$ /blog permanent;
    rewrite ^/at-home-devices-vs-professional-treatments/?$ /blog permanent;
    rewrite ^/understanding-red-light-therapy/?$ /blog permanent;
    rewrite ^/treatment-frequency-body-parts/?$ /blog permanent;
    rewrite ^/top-10-red-light-therapy-belts/?$ /blog permanent;
    rewrite ^/red-light-therapy-belts-popularity/?$ /blog permanent;
    rewrite ^/red-light-therapy-benefits/?$ /blog permanent;
    rewrite ^/trending-red-light-products-2023/?$ /blog permanent;
    rewrite ^/popular-red-light-products/?$ /blog permanent;
    rewrite ^/popular-red-light-products-canada/?$ /blog permanent;
    rewrite ^/red-light-therapy-belt-benefits/?$ /blog permanent;

    # ==========================================
    # 3. Clean URLs (Extensionless HTML processing)
    # ==========================================
    location / {
        # Attempt to serve:
        # 1. Exact file match ($uri)
        # 2. Directory index ($uri/)
        # 3. Extensionless html file ($uri.html) - crucial for clean URLs
        # 4. Fallback to 404
        try_files $uri $uri/ $uri.html =404;
    }

    # Error Pages
    error_page  404              /404.html;
    location = /404.html {
        root   /usr/share/nginx/html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # ==========================================
    # 3c. Product page URL redirects (old to new names)
    # ==========================================
    rewrite ^/pro-300w-mini-panel/?$ /mini-panel-300w permanent;
    rewrite ^/clinical-7-color-led-mask/?$ /silicone-led-mask permanent;
    rewrite ^/luxor-360-therapy-bed/?$ /luxor-360-bed permanent;
    rewrite ^/targeted-cold-laser-pen/?$ /laser-pen permanent;
    rewrite ^/pain-relief-therapy-belt/?$ /therapy-belt permanent;

    # Blog URL redirects (old/alternate to current names)
    rewrite ^/blog/compare-red-light-therapy-brands/?$ /blog/how-to-choose-red-light-therapy-wholesale-supplier permanent;
    rewrite ^/blog/best-red-light-therapy-belts/?$ /blog/red-light-therapy-equipment-cost-guide permanent;
    rewrite ^/blog/best-red-light-therapy-canada/?$ /blog/how-to-start-red-light-therapy-business permanent;
    rewrite ^/blog/best-red-light-therapy-sleeping-bags/?$ /blog/red-light-therapy-equipment-cost-guide permanent;
}

