<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://helloredlight.com/zh/thank-you" />
    <link rel="alternate" hreflang="zh-CN" href="https://helloredlight.com/zh/thank-you" />
    <link rel="alternate" hreflang="en" href="https://helloredlight.com/thank-you" />
    <link rel="alternate" hreflang="x-default" href="https://helloredlight.com/thank-you" />
    <title>询盘已收到 | Hello Red Light</title>
    <meta name="description" content="您的批发询盘已提交至 Hello Red Light。我们的 B2B 团队将根据需求回复报价、MOQ 与后续流程。" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "首页", "item": "https://helloredlight.com/zh/" },
        { "@type": "ListItem", "position": 2, "name": "感谢页", "item": "https://helloredlight.com/zh/thank-you" }
      ]
    }
    </script>
</head>
<body class="bg-brand-light min-h-screen flex flex-col">
    <header class="bg-white shadow sticky top-0 z-50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-20">
            <a href="/zh" class="text-2xl font-bold tracking-tight text-brand-dark">
                HELLO<span class="text-brand-primary">REDLIGHT</span> <span class="text-xs uppercase ml-1 opacity-60">B2B</span>
            </a>
            <nav class="hidden md:flex space-x-6 items-center">
                <a href="/zh/products" class="text-gray-600 hover:text-brand-primary font-medium">产品中心</a>
                <a href="/zh/factory" class="text-gray-600 hover:text-brand-primary font-medium">工厂实力</a>
                <a href="/zh/cases" class="text-gray-600 hover:text-brand-primary font-medium">成功案例</a>
                <a href="/zh/certifications" class="text-gray-600 hover:text-brand-primary font-medium">认证资质</a>
                <a href="/zh/contact" class="btn btn-primary text-sm px-4 py-2">联系我们</a>
                <div class="border-l border-gray-300 pl-4">
                    <a href="/thank-you" class="text-gray-500 hover:text-brand-dark">EN</a> |
                    <span class="font-bold text-brand-primary">ZH</span>
                </div>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-20">
        <div class="container max-w-3xl">
            <div class="bg-white border border-gray-200 rounded-2xl shadow-xl p-8 md:p-12 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-brand-primary text-3xl mb-6">+</div>
                <h1 class="text-4xl font-bold text-brand-dark mb-4">询盘已收到</h1>
                <p class="text-lg text-gray-600 leading-relaxed mb-8">我们的 B2B 团队已经收到您的需求。后续回复通常会包含匹配产品建议、MOQ、交期方向，以及是否需要样品或合规资料。</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-left mb-10">
                    <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
                        <div class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">步骤 1</div>
                        <p class="text-sm text-gray-700">我们先评估您的采购量、目标市场与产品方向。</p>
                    </div>
                    <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
                        <div class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">步骤 2</div>
                        <p class="text-sm text-gray-700">根据需求回复报价区间、交期路径或认证资料申请方式。</p>
                    </div>
                    <div class="rounded-xl border border-gray-200 bg-gray-50 p-4">
                        <div class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">步骤 3</div>
                        <p class="text-sm text-gray-700">进入样品评估、OEM 方案确认或分销审核流程。</p>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <a href="/zh/resources" class="btn btn-secondary px-8 py-3">采购资料中心</a>
                    <a href="/zh/products" class="btn btn-secondary px-8 py-3">继续看产品</a>
                    <a href="/zh/contact.html?intent=follow-up" class="btn btn-primary px-8 py-3">补充需求</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-[#0b0b14] text-gray-400 py-8 text-center text-sm border-t border-gray-800">
        &copy; 2026 Hello Red Light B2B 制造厂.
    </footer>

    <script type="module" src="/src/main.js"></script>

</html>
